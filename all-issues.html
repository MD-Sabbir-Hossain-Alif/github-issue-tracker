<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="md. sabbir hossain ailf">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- daisyui + tailwind css-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font aweesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font Geist + styles -->
    <link rel="stylesheet" href="style.css">

<body class="bg-[#F8FAFC] ">
    <!-- header section -->
    <header>
        <nav class="bg-base-100 shadow-sm">
            <div class="navbar max-w-400 mx-auto  gap-1 sm:px-10 md:px-20">
                <div class="flex-1 flex items-center gap-2">
                    <a href="./all-issues.html"><img class="max-w-9" src="assets/github-logo.png" alt=""></a>
                    <a href="./all-issues.html"
                        class="font-semibold text-color-main cursor-pointer text-xl hidden md:block ">GitHub Issues
                        Tracker</a>
                </div>
                <div class="flex gap-2">
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search" />
                    </label>

                    <div class="whitespace-nowrap">
                        <button class="btn btn-primary "><i class="fa-solid fa-plus"></i> New Issue</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="issues-container min-h-screen py-15 space-y-4">
        <!-- tab section -->
        <section>
            <div class="flex gap-2 p-6 shadow-sm bg-white rounded-lg">
                <button id="all-tab" onclick="toggle('all-tab')" class="btn btn-primary sm:w-30 px-3 py-2 text-white">All</button>
                <button id="open-tab" onclick="toggle('open-tab')" class="btn sm:w-30 px-3 py-2 text-color-gray ">Open</button>
                <button id="closed-tab" onclick="toggle('closed-tab')" class="btn sm:w-30 px-3 py-2 text-color-gray">Closed</button>
            </div>
        </section>

        <!-- all issue and status section -->
        <section>
            <!-- status section -->
            <section class="flex flex-wrap text-center sm:text-start justify-between items-center gap-2 p-2 sm:p-6 shadow-sm bg-white border-b border-b-[#E4E4E7] rounded-lg rounded-b-none">
                <div class="flex mx-auto sm:mx-0 flex-col sm:flex-row items-center gap-2">
                    <div class=" bg-[#ECE4FF] sm:p-2 rounded-full">
                        <img src="assets/Aperture.png" alt="">
                    </div>

                    <div>
                        <h4 class="text-color-main text-xl font-semibold"><span id="total-issue">0</span> Issues</h4>
                        <p class="text-color-gray">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex mx-auto sm:mx-0 gap-4">
                    <p class="text-color-main font-medium"><samp class="badge bg-green-600 badge-xs"></samp> Open</p>
                    <p class="text-color-main font-medium"><samp class="badge bg-purple-600 badge-xs"></samp> Closed</p>
                </div>
            </section>

            <!-- issue section -->
            <section>
                <div id="issue-container" class="grid grid-cols-[repeat(auto-fit,minmax(250px,1fr))] bg-[#FBFBFB] gap-3 p-6 rounded-b-lg shadow-sm">

    </main>
