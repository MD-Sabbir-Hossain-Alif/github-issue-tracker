<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="md. sabbir hossain ailf">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- daisyui + tailwind css-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font aweesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font Geist + styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#F8FAFC] max-w-400 mx-auto">
    <!-- header section -->
    <header>
        <nav>
            <div class="navbar bg-base-100 shadow-sm gap-1 sm:px-10 md:px-20">
                <div class="flex-1 flex items-center gap-2">
                    <a href="./all-issues.html"><img class="max-w-9" src="assets/github-logo.png" alt=""></a>
                    <a href="./all-issues.html" class="font-semibold text-color cursor-pointer text-xl hidden md:block ">GitHub Issues Tracker</a>
                </div>
                <div class="flex gap-2">
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search" />
                    </label>

                    <div class="whitespace-nowrap">
                        <button class="btn btn-primary "><i class="fa-solid fa-plus"></i> New Issue</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    

</body>

</html>
