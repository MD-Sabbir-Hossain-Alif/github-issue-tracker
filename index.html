<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="md. sabbir hossain ailf">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Sign In</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- daisyui + tailwind css-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font aweesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font Geist + styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#F8FAFC] min-h-screen sm:py-15">
    <main class="card bg-base-100 shadow-xl max-w-130 mx-auto ">
        <div class="flex flex-col justify-center items-center p-8">
            <div id="logo" class="flex flex-col gap-6 items-center text-center">
                <img src="assets/github-logo.png" alt="github logo">
                <div>
                    <h3 class="text-2xl font-semibold text-color-main">GitHub Issues Tracker</h3>
                    <p class="text-color-gray">Sign in to manage your issues</p>
                </div>
            </div>

            <div id="form" class="w-full max-w-full mx-auto mt-6">
                <fieldset class="fieldset text-base">
                    <label class="label text-color-main font-medium">Username</label>
                    <input id="input-user" type="text" class="input w-full" placeholder="Enter Username" value="admin" />
                    <p class="text-[#4A00FF] mb-3">Default: admin</p>
                
                    <label class="label text-color-main font-medium">Password</label>
                    <input id="input-pass" type="password" class="input w-full" placeholder="Password" value="admin123" />
                    <p class="text-[#4A00FF]">Default: admin123</p>

                    <button id="login-btn" class="btn btn-primary mt-4 w-full">Sign In</button>
                </fieldset>
            </div>

            <div class="flex justify-between items-center w-full gap-2 py-6">
                <hr class="border w-full border-[#64748b8c] my-4">
                <p>OR</p>
                <hr class="border w-full border-[#64748B8c] my-4">
            </div>

            <div class="text-center">
                <p class="text-color-gray text-sm mb-4">Demo Credentials:</p>
                <p>
                    <span class="text-color-main font-semibold">Username:</span> admin
                    <br>
                    <span class="text-color-main font-semibold">Password:</span> admin123
                </p>
            </div>
        </div>
        <script src="scripts/login.js"></script>
    </main>

</html>
